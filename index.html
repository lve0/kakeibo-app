<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>袋分け家計簿</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav">
      <div class="brand">
        <div class="brand-mark" data-icon="wallet"></div>
        <div>
          <strong>家計簿アプリ</strong>
          <span>袋分け家計簿</span>
        </div>
      </div>
      <button class="nav active" data-page="home"><span data-icon="home"></span><span>ホーム</span></button>
      <button class="nav" data-page="input"><span data-icon="plus"></span><span>入力</span></button>
      <button class="nav" data-page="history"><span data-icon="list"></span><span>履歴</span></button>
      <button class="nav" data-page="graphs"><span data-icon="chart"></span><span>グラフ</span></button>
      <button class="nav" data-page="settings"><span data-icon="settings"></span><span>設定</span></button>
    </aside>

    <main class="main">
      <section id="home" class="page active">
        <header class="mobile-header">
          <h1>ホーム</h1>
          <button class="icon-button" aria-label="通知"><span data-icon="bell"></span></button>
        </header>

        <section class="hero-balance">
          <div>
            <p>今月の残高（収入−支出）</p>
            <strong id="balanceView">¥0</strong>
          </div>
          <span id="monthLabel" class="month-pill"></span>
        </section>

        <div class="section-title">
          <h2>カテゴリ別の残り予算</h2>
          <button data-page-jump="settings">一覧編集</button>
        </div>
        <div id="categoryCards" class="category-list"></div>

        <section class="card">
          <div class="section-title inner">
            <h2>最近の支出</h2>
            <button data-page-jump="history">すべて見る</button>
          </div>
          <div id="recentList" class="list"></div>
        </section>
      </section>

      <section id="input" class="page">
        <header class="mobile-header">
          <button class="link-button" data-page-jump="home">キャンセル</button>
          <h1>支出入力</h1>
          <span></span>
        </header>

        <form id="expenseForm" class="input-form">
          <label>日付
            <input id="expenseDate" type="date">
          </label>

          <label>金額
            <div class="money-input">
              <span>¥</span>
              <input id="expenseAmount" type="number" inputmode="numeric" placeholder="1,200">
            </div>
          </label>

          <div>
            <h2 class="field-heading">カテゴリ</h2>
            <div id="categoryPicker" class="category-picker"></div>
          </div>

          <label>メモ（任意）
            <textarea id="expenseMemo" placeholder="メモを入力"></textarea>
          </label>

          <button class="primary" type="submit">支出を追加</button>
          <p id="inputMessage" class="message"></p>
        </form>
      </section>

      <section id="history" class="page">
        <header class="mobile-header">
          <h1>履歴</h1>
          <button class="icon-button" aria-label="検索"><span data-icon="search"></span></button>
        </header>

        <div class="month-row">
          <button id="historyPrev">‹</button>
          <input id="filterMonth" type="month">
          <button id="historyNext">›</button>
        </div>

        <section class="summary-row">
          <div class="mini-card">
            <span>支出合計</span>
            <strong id="historyExpenseTotal">¥0</strong>
          </div>
          <div class="mini-card">
            <span>収入合計</span>
            <strong id="historyIncomeTotal">¥0</strong>
          </div>
        </section>

        <label class="filter-label">カテゴリ
          <select id="filterCategory"></select>
        </label>
        <label class="filter-label">検索
          <input id="filterKeyword" placeholder="メモ検索">
        </label>

        <div id="historyList" class="history-list"></div>
      </section>

      <section id="graphs" class="page">
        <header class="mobile-header">
          <h1>グラフ</h1>
          <span></span>
        </header>

        <div class="segmented">
          <button class="tab active" data-graph="monthly">支出</button>
          <button class="tab" data-graph="annual">年間</button>
          <button class="tab" data-graph="trend">推移</button>
        </div>

        <section class="card chart-card">
          <h2 id="graphTitle">カテゴリ別 支出割合</h2>
          <canvas id="graphCanvas"></canvas>
        </section>
      </section>

      <section id="settings" class="page">
        <header class="mobile-header">
          <h1>設定</h1>
          <span></span>
        </header>

        <section class="settings-group">
          <h2>予算設定</h2>
          <button class="setting-row" data-open-settings="month">月間予算の設定 <span>›</span></button>
          <button class="setting-row" data-open-settings="category">カテゴリ別予算の設定 <span>›</span></button>
        </section>

        <section id="monthSettings" class="settings-panel">
          <label>対象月
            <input id="settingMonth" type="month">
          </label>
          <label>今月の収入
            <input id="settingIncome" type="number" inputmode="numeric">
          </label>
          <h2>カテゴリ別予算</h2>
          <div id="budgetInputs" class="budget-inputs"></div>
          <button id="saveMonthSettings" class="primary">保存する</button>
        </section>

        <section class="settings-group">
          <h2>データ</h2>
          <button id="exportData" class="setting-row">データのエクスポート <span>›</span></button>
          <label class="setting-row import-row">データのインポート
            <input id="importData" type="file" accept="application/json">
            <span>›</span>
          </label>
        </section>

        <section class="settings-group">
          <h2>カテゴリ管理</h2>
          <div id="categorySettings" class="category-settings"></div>
          <div class="add-category">
            <input id="newCategoryName" placeholder="カテゴリ名">
            <button id="addCategory">追加</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-sheet">
      <div class="sheet-bar"></div>
      <header class="modal-header">
        <button data-close-modal>戻る</button>
        <h2 id="detailTitle">カテゴリ詳細</h2>
        <button data-page-jump="input">支出を追加</button>
      </header>
      <div id="detailContent"></div>
    </section>
  </div>

  <nav class="bottom-nav">
    <button class="bottom active" data-page="home"><span data-icon="home"></span><span>ホーム</span></button>
    <button class="bottom" data-page="input"><span data-icon="plus"></span><span>入力</span></button>
    <button class="bottom" data-page="history"><span data-icon="list"></span><span>履歴</span></button>
    <button class="bottom" data-page="graphs"><span data-icon="chart"></span><span>グラフ</span></button>
    <button class="bottom" data-page="settings"><span data-icon="settings"></span><span>設定</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
