<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>袋分け家計簿</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<main>
<section id="home" class="page active">
<header><h1>ホーム</h1><button class="iconBtn" id="bell"></button></header>
<div class="hero"><div><p>今月の残高（収入−支出）</p><strong id="balance">¥0</strong></div><span id="monthNow"></span></div>
<div class="title"><h2>カテゴリ別の残り予算</h2><button data-page="settings">一覧編集</button></div>
<div id="catCards" class="catList"></div>
<div class="card"><div class="title in"><h2>最近の支出</h2><button data-page="history">すべて見る</button></div><div id="recent"></div></div>
</section>

<section id="input" class="page">
<header class="three"><button data-page="home">キャンセル</button><h1>支出入力</h1><span></span></header>
<form id="form" class="form">
<label>日付<input id="date" type="date"></label>
<label>金額<div class="money"><span>¥</span><input id="amount" type="number" inputmode="numeric" placeholder="1,200"></div></label>
<div><h2>カテゴリ</h2><div id="picker" class="picker"></div></div>
<label>メモ（任意）<textarea id="memo" placeholder="メモを入力"></textarea></label>
<button class="primary">支出を追加</button><p id="msg"></p>
</form>
</section>

<section id="history" class="page">
<header><h1>履歴</h1><button class="iconBtn" id="search"></button></header>
<div class="monthRow"><button id="prevM">‹</button><input id="histMonth" type="month"><button id="nextM">›</button></div>
<div class="miniGrid"><div><span>支出合計</span><strong id="histSpent">¥0</strong></div><div><span>収入合計</span><strong id="histIncome">¥0</strong></div></div>
<label class="filter">カテゴリ<select id="histCat"></select></label>
<label class="filter">検索<input id="keyword" placeholder="メモ検索"></label>
<div id="historyList"></div>
</section>

<section id="graphs" class="page">
<header><h1>グラフ</h1><span></span></header>
<div class="tabs"><button class="tab active" data-graph="pie">支出</button><button class="tab" data-graph="stack">年間</button><button class="tab" data-graph="trend">推移</button></div>
<div class="card chartCard"><h2 id="graphTitle">カテゴリ別 支出割合</h2><canvas id="graph"></canvas></div>
</section>

<section id="settings" class="page">
<header><h1>設定</h1><span></span></header>
<div class="group"><h2>予算設定</h2><button class="setting">月間予算の設定 <span>›</span></button><button class="setting">カテゴリ別予算の設定 <span>›</span></button></div>
<div class="panel">
<label>対象月<input id="setMonth" type="month"></label>
<label>今月の収入<input id="income" type="number" inputmode="numeric"></label>
<h2>カテゴリ別予算</h2><div id="budgets"></div><button id="saveSettings" class="primary">保存する</button>
</div>
<div class="group"><h2>データ</h2><button id="export" class="setting">データのエクスポート <span>›</span></button><label class="setting import">データのインポート<input id="import" type="file" accept="application/json"><span>›</span></label></div>
</section>
</main>
</div>

<div id="modal" hidden><div class="backdrop" data-close></div><section class="sheet"><div class="bar"></div><header class="modalHead"><button data-close>戻る</button><h2 id="detailTitle"></h2><button data-page="input">支出を追加</button></header><div id="detail"></div></section></div>

<nav>
<button class="nav active" data-page="home" id="nHome"><b>ホーム</b></button>
<button class="nav" data-page="input" id="nPlus"><b>入力</b></button>
<button class="nav" data-page="history" id="nFile"><b>履歴</b></button>
<button class="nav" data-page="graphs" id="nChart"><b>グラフ</b></button>
<button class="nav" data-page="settings" id="nSet"><b>設定</b></button>
</nav>
<script src="app.js"></script>
</body></html>
